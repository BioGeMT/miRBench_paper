name: postprocess
channels:
  - conda-forge
  - bioconda
  - defaults
  - hcc
dependencies:
  - matplotlib-base
  - r-base
  - bioconductor-biostrings
  - bioconductor-decipher
  - pybigwig
  - python-levenshtein

  # Core
  - python
  - pip

  # Data handling
  - pandas
  - numpy

  # CLI / utilities for genomic-region-annotator
  - click
  - requests
  - intervaltree

  # Bio
  - biopython

  # Pip-only (genomics + dev tools)
  - pip
  - pip:
      - pyranges
      - gffutils
      - git+https://github.com/BioGeMT/genomic_region_annotator.git@v1.0.0